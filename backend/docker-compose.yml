version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: zeroproxy_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zeroproxy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zeroproxy_redis
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:7
    container_name: zeroproxy_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
